<!DOCTYPE html>
<html>
  <html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    
    <link rel="icon" href="Logos/favicon.png">
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
      

<img src="Logos/Bounce.png" onclick="loadP5Sketch()" style="cursor:pointer; width:200px;">

  <!-- The p5 canvas will be added here -->
  <div id="p5-container"></div>

  <script>
    function loadP5Sketch() {
      // 1. Load the p5.js core library first
      const p5Lib = document.createElement('script');
      p5Lib.src = "https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js";
      
      p5Lib.onload = () => {
        // 2. Load your specific sketch file after the library is ready
        const mySketch = document.createElement('script');
        mySketch.src = "Bounce.js"; 
        document.body.appendChild(mySketch);
      };

      document.body.appendChild(p5Lib);
    }
  </script>
  </body>
</html>
