<!DOCTYPE html>
<html>
  <html lang="en">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    
    
    <link rel="icon" href="Logos/favicon.png">
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
      

<img src="Logos/Bounce.png" id="bounceImg" style="cursor: pointer; width:200px">

<script>
let loaded = false;

document.getElementById("bounceImg").onclick = function () {
    if (!loaded) {
        // load p5 library first
        let p5script = document.createElement("script");
        p5script.src = "https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js";

        p5script.onload = function () {
            // then load your sketch
            let sketch = document.createElement("script");
            sketch.src = "Bounce.js";
            document.body.appendChild(sketch);
        };

        document.body.appendChild(p5script);
        loaded = true;
    }
};
</script>
  </body>
</html>
